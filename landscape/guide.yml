categories:
  - category: Introduction
    keywords: []
    content: |
      This landscape maps the curated MCP servers listed in
      [awesome-mcp-servers](https://github.com/mcpHQ/awesome-mcp-servers).
      The canonical catalog lives in `data/servers.json`; this site is generated
      with [CNCF Landscape2](https://github.com/cncf/landscape2).

      Use the grid to browse by category, search by name or tag, and open each
      card for links and metadata. **Official** entries are backed by the vendor
      or the MCP project itself.

    subcategories:
      - subcategory: How to use this map
        content: |
          #### Browse

          Zoom and pan the grid, or switch to card view. Categories match the
          README catalog (databases, developer tools, browsers, and so on).

          #### Search

          Search matches server names, descriptions, languages, providers, and tags.

          #### Contribute

          Add or update entries in `data/servers.json`, then run:

          ```bash
          npm run generate
          npm run build-landscape
          ```

